name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-14,      target: aarch64-apple-darwin }
          - { os: macos-13,      target: x86_64-apple-darwin }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev llvm-dev cmake

      - name: Build binaries (in-memory + rocks + mcp)
        shell: bash
        run: |
          set -euo pipefail
          T="${{ matrix.target }}"
          NAME="chronos-graph-${GITHUB_REF_NAME}-${T}"
          OUT="dist/${NAME}"
          mkdir -p "$OUT"

          cargo build --release --locked --target "$T" -p chronos-mcp
          cp "target/$T/release/chronos-mcp" "$OUT/chronos-mcp"

          cargo build --release --locked --target "$T" -p chronos-server
          cp "target/$T/release/chronos-server" "$OUT/chronos-server"

          cargo build --release --locked --target "$T" -p chronos-server --features rocks
          cp "target/$T/release/chronos-server" "$OUT/chronos-server-rocks"

          cp README.md "$OUT/" 2>/dev/null || true
          cp LICENSE "$OUT/" 2>/dev/null || true
          tar -C dist -czf "${NAME}.tar.gz" "${NAME}"
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          ls -lh "${NAME}.tar.gz"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            chronos-graph-*-${{ matrix.target }}.tar.gz
            chronos-graph-*-${{ matrix.target }}.tar.gz.sha256

  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish:
    name: Publish GitHub Release
    needs: [binaries]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          generate_release_notes: true
          body: |
            Chronos-Graph ${{ github.ref_name }} — a bitemporal-native graph database for RAG and AI-agent memory.

            ## Install
            **Binaries** — download the tarball for your platform below; it contains:
            - `chronos-server` (in-memory) and `chronos-server-rocks` (durable RocksDB)
            - `chronos-mcp` (MCP server over stdio)

            **Docker** — `docker run -p 8080:8080 -v chronos-data:/data ghcr.io/flymysql/chronos-graph:${{ github.ref_name }}`

            See https://flymysql.github.io/Chronos-Graph/ for full SDK & API docs.
